name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '35 15 * * 2'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep actions to monitor your workflow files for security flaws
          - language: actions
            build-mode: none
          # Switch Java to manual build mode for maximum taint-tracking accuracy
          - language: java-kotlin
            build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up the Java runtime specifically for the manual compilation step
    - name: Set up JDK
      if: matrix.build-mode == 'manual'
      uses: actions/setup-java@v4
      with:
        java-version: '25' # Adjust to match ERDDAP's required target JDK
        distribution: 'temurin'
        cache: 'maven'

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        config-file: ./.github/codeql/codeql-config.yml

    # Intercept the Java compilation process to map the Abstract Syntax Tree
    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        mvn clean compile -DskipTests

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
